<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent-first Browser</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(var(--border))',
                        input: 'hsl(var(--input))',
                        ring: 'hsl(var(--ring))',
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        primary: {
                            DEFAULT: 'hsl(var(--primary))',
                            foreground: 'hsl(var(--primary-foreground))'
                        },
                        secondary: {
                            DEFAULT: 'hsl(var(--secondary))',
                            foreground: 'hsl(var(--secondary-foreground))'
                        },
                        muted: {
                            DEFAULT: 'hsl(var(--muted))',
                            foreground: 'hsl(var(--muted-foreground))'
                        },
                        accent: {
                            DEFAULT: 'hsl(var(--accent))',
                            foreground: 'hsl(var(--accent-foreground))'
                        },
                        card: {
                            DEFAULT: 'hsl(var(--card))',
                            foreground: 'hsl(var(--card-foreground))'
                        },
                        destructive: {
                            DEFAULT: 'hsl(var(--destructive))',
                            foreground: 'hsl(var(--destructive-foreground))'
                        }
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)'
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 47.4% 11.2%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            line-height: 1.45;
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .chrome-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #f1f3f4;
            border-bottom: 1px solid #d6d9de;
        }

        .chrome-tabbar {
            display: flex;
            align-items: flex-end;
            height: 42px;
            padding: 6px 10px 0;
            background: #dee1e6;
        }

        .chrome-tabs {
            display: flex;
            min-width: 0;
            flex: 1;
            align-items: flex-end;
            gap: 1px;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-right: 8px;
        }

        .chrome-tab {
            display: flex;
            height: 34px;
            min-width: 168px;
            max-width: 240px;
            align-items: center;
            gap: 6px;
            padding: 0 8px 0 12px;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            background: transparent;
            color: #5f6368;
        }

        .chrome-tab.is-active {
            border-color: #cfd3d7;
            background: #ffffff;
            color: #202124;
        }

        .chrome-tab-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            border: none;
            background: transparent;
            padding: 0;
            color: inherit;
            text-align: left;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
            line-height: 18px;
            cursor: pointer;
        }

        .chrome-tab-close {
            display: inline-flex;
            height: 24px;
            width: 24px;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #5f6368;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
        }

        .chrome-tab-close:hover {
            background: #e8eaed;
            color: #202124;
        }

        .chrome-new-tab {
            display: inline-flex;
            height: 28px;
            width: 28px;
            flex: 0 0 auto;
            margin-left: 4px;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #5f6368;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
        }

        .chrome-new-tab:hover {
            background: #e8eaed;
            color: #202124;
        }

        .chrome-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid #d5d9de;
            background: #f1f3f4;
        }

        .chrome-nav-btn {
            display: inline-flex;
            height: 34px;
            width: 34px;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #5f6368;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
        }

        .chrome-nav-btn:hover:enabled {
            background: #e8eaed;
            color: #202124;
        }

        .chrome-nav-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .chrome-omnibox {
            display: flex;
            min-width: 0;
            flex: 1;
            align-items: center;
            gap: 10px;
            height: 36px;
            border: 1px solid #dfe1e5;
            border-radius: 999px;
            background: #ffffff;
            padding: 0 12px;
        }

        .chrome-omnibox-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0;
            color: #3c4043;
            font-size: 15px;
            outline: none;
        }

        .chrome-omnibox-input::placeholder {
            color: #6b7280;
        }

        .chrome-error {
            margin: 0 12px 10px;
            border: 1px solid #f3c3c3;
            border-radius: 8px;
            background: #fff2f2;
            padding: 8px 10px;
            color: #b3261e;
            font-size: 12px;
        }

        .ax-node[data-role="document"] {
            padding-bottom: 2rem;
        }

        .ax-grid > .ax-item {
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            background: hsl(var(--card));
            min-height: 3.5rem;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .ax-main > .ax-paragraph,
        .ax-main > .ax-text {
            max-width: 72ch;
        }

        .ax-main > .ax-node {
            margin-bottom: 0.35rem;
        }

        .ax-nav-main > .ax-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .ax-nav-directory > .ax-heading-h2 {
            margin-top: 1.25rem;
        }

        .ax-nav-directory > .ax-heading-h2:first-child {
            margin-top: 0;
        }
    </style>
</head>
<body class="bg-background text-foreground antialiased">
    <header class="chrome-header">
        <div class="chrome-tabbar">
            <div id="tabs" class="chrome-tabs">
                <button id="new-tab-button" type="button" class="chrome-new-tab" aria-label="New tab">+</button>
            </div>
        </div>

        <form id="url-form" class="chrome-toolbar">
            <button id="back-button" type="button" class="chrome-nav-btn" aria-label="Back" title="Back">←</button>
            <button id="forward-button" type="button" class="chrome-nav-btn" aria-label="Forward" title="Forward">→</button>
            <button id="reload-button" type="button" class="chrome-nav-btn" aria-label="Reload" title="Reload">↻</button>
            <label class="chrome-omnibox" for="url-input">
                <input
                    id="url-input"
                    name="url"
                    type="text"
                    placeholder="Type website URL here"
                    class="chrome-omnibox-input"
                />
            </label>
        </form>

        <div id="error" hidden class="chrome-error"></div>
    </header>

    <main id="content" class="mx-auto w-full max-w-6xl px-3 py-4">
        <div class="w-full rounded-lg border border-border bg-card p-6 text-sm text-muted-foreground">No snapshot yet.</div>
    </main>

    <script>
        const DEFAULT_STATUS = '';

        const form = document.getElementById('url-form');
        const input = document.getElementById('url-input');
        const backButton = document.getElementById('back-button');
        const forwardButton = document.getElementById('forward-button');
        const reloadButton = document.getElementById('reload-button');
        const tabsEl = document.getElementById('tabs');
        const errorEl = document.getElementById('error');
        const contentEl = document.getElementById('content');

        let nextTabId = 1;
        const tabs = [];
        let activeTabId = null;

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function shorten(value, maxLength = 28) {
            if (!value || value.length <= maxLength) return value;
            return `${value.slice(0, maxLength - 3)}...`;
        }

        function deriveTitleFromEntry(entry) {
            if (entry && entry.targetUrl) {
                try {
                    const parsed = new URL(entry.targetUrl);
                    const path = parsed.pathname && parsed.pathname !== '/' ? parsed.pathname : '';
                    return shorten(`${parsed.hostname}${path}`);
                } catch {
                    return shorten(entry.targetUrl);
                }
            }

            if (entry && entry.rawUrl && entry.rawUrl.trim()) {
                return shorten(entry.rawUrl.trim());
            }

            if (entry && entry.errorMessage) {
                return 'Load error';
            }

            return 'New Tab';
        }

        function renderContent(htmlPieces) {
            if (!Array.isArray(htmlPieces) || htmlPieces.length === 0) {
                contentEl.innerHTML = '<div class="w-full rounded-lg border border-border bg-card p-6 text-sm text-muted-foreground">No snapshot yet.</div>';
                return;
            }

            contentEl.innerHTML = htmlPieces.join('\n');
        }

        function getTabById(tabId) {
            return tabs.find((tab) => tab.id === tabId) || null;
        }

        function getActiveTab() {
            if (activeTabId === null) return null;
            return getTabById(activeTabId);
        }

        function getCurrentEntry(tab) {
            if (!tab || tab.historyIndex < 0 || tab.historyIndex >= tab.history.length) return null;
            return tab.history[tab.historyIndex];
        }

        function applyEntryToTab(tab, entry) {
            tab.statusMessage = entry?.statusMessage || DEFAULT_STATUS;
            tab.errorMessage = entry?.errorMessage || '';
            tab.inputValue = entry?.targetUrl || entry?.rawUrl || tab.inputValue;
            tab.title = deriveTitleFromEntry(entry);
        }

        function renderTabs() {
            const tabsHtml = tabs.map((tab) => {
                const isActive = tab.id === activeTabId;
                const rootClass = isActive ? 'chrome-tab is-active' : 'chrome-tab';

                return `
                    <div class="${rootClass}">
                        <button type="button" data-action="activate" data-tab-id="${tab.id}" class="chrome-tab-title">${escapeHtml(tab.title)}</button>
                        <button type="button" data-action="close" data-tab-id="${tab.id}" class="chrome-tab-close" aria-label="Close tab">×</button>
                    </div>
                `;
            }).join('');
            tabsEl.innerHTML = `${tabsHtml}<button id="new-tab-button" type="button" class="chrome-new-tab" aria-label="New tab">+</button>`;
            tabsEl.querySelector('#new-tab-button')?.addEventListener('click', () => {
                createTab();
            });
        }

        function renderActiveTab() {
            if (tabs.length === 0) {
                renderContent([]);
                errorEl.hidden = true;
                return;
            }

            if (!getActiveTab()) {
                activeTabId = tabs[0].id;
            }

            const tab = getActiveTab();
            const entry = getCurrentEntry(tab);

            renderTabs();

            input.value = tab.inputValue || '';
            if (tab.errorMessage) {
                errorEl.hidden = false;
                errorEl.innerHTML = escapeHtml(tab.errorMessage);
            } else {
                errorEl.hidden = true;
                errorEl.textContent = '';
            }

            renderContent(entry ? entry.htmlPieces : []);

            backButton.disabled = tab.loading || tab.historyIndex <= 0;
            forwardButton.disabled = tab.loading || tab.historyIndex < 0 || tab.historyIndex >= tab.history.length - 1;
            reloadButton.disabled = tab.loading;
        }

        function createTab(initialUrl = '') {
            const tab = {
                id: nextTabId,
                title: 'New Tab',
                inputValue: initialUrl,
                statusMessage: DEFAULT_STATUS,
                errorMessage: '',
                history: [],
                historyIndex: -1,
                loading: false,
                requestToken: 0
            };

            nextTabId += 1;
            tabs.push(tab);
            activeTabId = tab.id;
            renderActiveTab();

            if (initialUrl) {
                loadSnapshotForTab(tab, initialUrl);
            }
        }

        function closeTab(tabId) {
            const index = tabs.findIndex((tab) => tab.id === tabId);
            if (index === -1) return;

            const wasActive = activeTabId === tabId;
            tabs.splice(index, 1);

            if (tabs.length === 0) {
                createTab();
                return;
            }

            if (wasActive) {
                const nextIndex = Math.max(0, index - 1);
                activeTabId = tabs[nextIndex].id;
            }

            renderActiveTab();
        }

        function pushHistoryEntry(tab, entry) {
            if (tab.historyIndex < tab.history.length - 1) {
                tab.history = tab.history.slice(0, tab.historyIndex + 1);
            }

            tab.history.push(entry);
            tab.historyIndex = tab.history.length - 1;
            applyEntryToTab(tab, entry);
        }

        async function loadSnapshotForTab(tab, rawUrl) {
            const requestToken = tab.requestToken + 1;
            tab.requestToken = requestToken;
            tab.loading = true;
            tab.statusMessage = 'Loading snapshot...';
            tab.errorMessage = '';
            tab.inputValue = rawUrl;
            renderActiveTab();

            try {
                if (!window.snapshotApi || typeof window.snapshotApi.loadSnapshot !== 'function') {
                    throw new Error('Snapshot API bridge is unavailable. Restart the app.');
                }

                const response = await window.snapshotApi.loadSnapshot(rawUrl);
                if (!getTabById(tab.id) || tab.requestToken !== requestToken) return;

                pushHistoryEntry(tab, response);
            } catch (error) {
                if (!getTabById(tab.id) || tab.requestToken !== requestToken) return;

                const message = error instanceof Error ? error.message : String(error);
                pushHistoryEntry(tab, {
                    rawUrl,
                    statusMessage: 'Failed to load snapshot.',
                    errorMessage: message,
                    htmlPieces: []
                });
            } finally {
                if (!getTabById(tab.id) || tab.requestToken !== requestToken) return;
                tab.loading = false;
                renderActiveTab();
            }
        }

        function goBack() {
            const tab = getActiveTab();
            if (!tab || tab.loading || tab.historyIndex <= 0) return;

            tab.historyIndex -= 1;
            applyEntryToTab(tab, getCurrentEntry(tab));
            renderActiveTab();
        }

        function goForward() {
            const tab = getActiveTab();
            if (!tab || tab.loading || tab.historyIndex >= tab.history.length - 1) return;

            tab.historyIndex += 1;
            applyEntryToTab(tab, getCurrentEntry(tab));
            renderActiveTab();
        }

        function reloadCurrent() {
            const tab = getActiveTab();
            if (!tab || tab.loading) return;

            const entry = getCurrentEntry(tab);
            const urlToReload = entry?.targetUrl || entry?.rawUrl || tab.inputValue || '';
            if (!urlToReload.trim()) return;

            loadSnapshotForTab(tab, urlToReload);
        }

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const tab = getActiveTab();
            if (!tab) return;

            loadSnapshotForTab(tab, input.value || '');
        });

        input.addEventListener('input', () => {
            const tab = getActiveTab();
            if (!tab) return;
            tab.inputValue = input.value || '';
        });

        tabsEl.addEventListener('click', (event) => {
            const target = event.target.closest('button[data-action]');
            if (!target) return;

            const tabId = Number(target.getAttribute('data-tab-id'));
            if (!Number.isFinite(tabId)) return;

            const action = target.getAttribute('data-action');
            if (action === 'activate') {
                activeTabId = tabId;
                renderActiveTab();
                return;
            }

            if (action === 'close') {
                closeTab(tabId);
            }
        });

        backButton.addEventListener('click', goBack);
        forwardButton.addEventListener('click', goForward);
        reloadButton.addEventListener('click', reloadCurrent);

        createTab();
    </script>
</body>
</html>
