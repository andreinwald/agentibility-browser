<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent-first Browser</title>
    <script src="./tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./renderer.css" />
</head>
<body class="bg-background text-foreground antialiased">
    <header class="chrome-header">
        <div class="chrome-tabbar">
            <div id="tabs" class="chrome-tabs">
                <button id="new-tab-button" type="button" class="chrome-new-tab" aria-label="New tab">+</button>
            </div>
        </div>

        <form id="url-form" class="chrome-toolbar">
            <button id="back-button" type="button" class="chrome-nav-btn" aria-label="Back" title="Back">←</button>
            <button id="forward-button" type="button" class="chrome-nav-btn" aria-label="Forward" title="Forward">→</button>
            <button id="reload-button" type="button" class="chrome-nav-btn" aria-label="Reload" title="Reload">↻</button>
            <label class="chrome-omnibox" for="url-input">
                <input
                    id="url-input"
                    name="url"
                    type="text"
                    placeholder="Type website URL here"
                    class="chrome-omnibox-input"
                />
            </label>
        </form>

        <div id="error" hidden class="chrome-error"></div>
    </header>

    <main id="content" class="mx-auto w-full max-w-6xl px-3 py-4">
        <div class="w-full rounded-lg border border-border bg-card p-6 text-sm text-muted-foreground">No snapshot yet.</div>
    </main>

    <script type="module" src="../../dist/electron/renderer.js"></script>
</body>
</html>
